<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Soporte TI - Grupo Presidente</title>
    <style>
        :root { 
            --primary: #3e2723; 
            --primary-light: #5d4037; 
            --accent: #1b5e20; 
            --bg: #111; 
            --text: #fff;
            --danger: #b71c1c;
        }

        body { margin: 0; font-family: 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); display: flex; justify-content: center; }
        
        .container { width: 100%; max-width: 500px; height: 100vh; display: flex; flex-direction: column; background: #000; border: 1px solid #333; }
        
        /* HEADER Y NAVEGACIÓN */
        .header { background: var(--primary); padding: 15px; text-align: center; font-weight: bold; font-size: 1.1rem; border-bottom: 2px solid var(--primary-light); }
        
        .nav-bar { display: flex; justify-content: space-between; padding: 8px; background: #1a1a1a; border-bottom: 1px solid #333; }
        
        .nav-bar button { background: #444; color: white; border: none; padding: 6px 12px; border-radius: 5px; cursor: pointer; font-size: 0.8rem; }
        
        /* CHAT AREA */
        #chat { flex: 1; padding: 15px; overflow-y: auto; display: flex; flex-direction: column; gap: 12px; scroll-behavior: smooth; }
        
        .msg { padding: 12px 16px; border-radius: 15px; max-width: 85%; animation: fadeIn 0.3s ease; line-height: 1.4; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        
        .bot { background: var(--primary-light); align-self: flex-start; border-bottom-left-radius: 2px; }
        .user { background: #795548; align-self: flex-end; border-bottom-right-radius: 2px; }

        /* INTERFAZ DE USUARIO */
        #menu { padding: 15px; background: #1a1a1a; border-top: 1px solid #333; min-height: 80px; }
        
        .buttons { display: flex; flex-wrap: wrap; gap: 8px; justify-content: center; }
        
        button.action-btn { padding: 12px 20px; border: none; border-radius: 10px; background: var(--primary-light); color: white; cursor: pointer; font-weight: bold; flex: 1; min-width: 140px; }
        
        .card { background: var(--primary); padding: 15px; border-radius: 12px; text-align: center; cursor: pointer; border: 1px solid #4e342e; flex: 1; min-width: 120px; }

        input { width: 100%; padding: 12px; border-radius: 10px; border: 1px solid #444; background: #222; color: white; box-sizing: border-box; margin-bottom: 10px; text-align: center; font-size: 1.1rem; }

        /* TICKET Y SOLUCIONES */
        .step-box { background: #222; border-left: 4px solid var(--primary-light); padding: 10px; margin: 5px 0; border-radius: 4px; font-style: italic; }
        .ticket { background: var(--accent); padding: 15px; border-radius: 10px; border-left: 6px solid #145a32; font-family: monospace; font-size: 0.85rem; }
    </style>
</head>
<body>

<div class="container">
    <div class="header">Asistente TI - Grupo Presidente</div>
    
    <div class="nav-bar">
        <button onclick="regresar()">⬅ Regresar</button>
        <button onclick="salir()">🚪 Salir / Reiniciar</button>
    </div>

    <div id="chat"></div>
    <div id="menu"></div>
</div>

<script>
/* ⚙️ CONFIGURACIÓN */
const CONFIG = {
    numeroTI: "522211553765",
    hoteles: { "Holy": "Holiday Inn Express", "Presidente": "Presidente Intercontinental" },
   areas: {
    "recepcion": "1234",
    "ama de llaves": "2222",
    "sistemas": "0000",
    "mantenimiento": "3333",
    "ventas": "4444",
    "prevencion": "5555",
    "rh": "6666",
    "gerencia": "7777",
    "alimentos y bebidas": "8888",
    "contabilidad": "9999"
}
};

/* 📚 ÁRBOL DE SOLUCIONES */
const SOLUCIONES = {
    "Internet": [
        "Revisa si el cable de red (Ethernet) está conectado firmemente detrás de la computadora.",
        "Apaga el Wi-Fi de tu equipo, espera 5 segundos y vuelve a encenderlo.",
        "Verifica si otros compañeros en tu misma área tienen el mismo problema."
    ],
    "Impresora": [
        "Abre la bandeja de papel y asegúrate de que no haya hojas dobladas o atoradas.",
        "Apaga la impresora desde el botón físico, cuenta hasta 10 y enciéndela de nuevo.",
        "Verifica que no haya mensajes de 'Tóner Agotado' o 'Error de Puerta' en la pantalla de la impresora."
    ],
    "Cerradura": [
        "Intenta abrir con una 'Tarjeta Maestra' para descartar si el problema es la tarjeta del huésped.",
        "Limpia la ranura de la cerradura con una tarjeta limpiadora o un paño seco.",
        "Si el LED parpadea en color AMARILLO, avisa a mantenimiento para cambio de baterías."
    ]
};

let contexto = { hotel: "", area: "", problema: "", paso: 0, historial: [] };

const chat = document.getElementById("chat");
const menu = document.getElementById("menu");

/* 📝 FUNCIONES DE MENSAJERÍA */
function msg(text, type = "bot", html = false) {
    const d = document.createElement("div");
    d.className = `msg ${type}`;
    if(html) d.innerHTML = text; else d.innerText = text;
    chat.appendChild(d);
    chat.scrollTop = chat.scrollHeight;
}

/* 🧭 NAVEGACIÓN */
function salir() {
    contexto = { hotel: "", area: "", problema: "", paso: 0, historial: [] };
    chat.innerHTML = "";
    elegirHotel();
}

function regresar() {
    if (contexto.historial.length > 0) {
        const ultimaAccion = contexto.historial.pop();
        ultimaAccion();
    }
}

function guardarPaso(fn) {
    contexto.historial.push(fn);
}

/* 🏨 FLUJO DE TRABAJO */
function elegirHotel() {
    msg("¡Buen día! Para comenzar, selecciona tu hotel:");
    menu.innerHTML = `
        <div class="buttons">
            <button class="action-btn" onclick="setHotel('Holy')">Holiday Inn</button>
            <button class="action-btn" onclick="setHotel('Presidente')">Presidente Intercontinental</button>
        </div>`;
}

function setHotel(h) {
    guardarPaso(elegirHotel);
    contexto.hotel = h;
    msg(`Ubicación establecida en: ${CONFIG.hoteles[h]}`, "user");
    msg("¿A qué área perteneces?");
    const bts = Object.keys(CONFIG.areas).map(a => 
        `<button class="action-btn" onclick="acceder('${a}')">${a.toUpperCase()}</button>`
    ).join("");
    menu.innerHTML = `<div class="buttons">${bts}</div>`;
}

function acceder(area) {
    guardarPaso(() => setHotel(contexto.hotel));
    contexto.area = area;
    msg(`Área: ${area.toUpperCase()}. Por favor, ingresa tu PIN:`);
    menu.innerHTML = `
        <input id="pin" type="password" inputmode="numeric" placeholder="0000">
        <button class="action-btn" onclick="verificarPin()">Confirmar PIN</button>`;
}

function verificarPin() {
    const p = document.getElementById("pin").value;
    if(p === CONFIG.areas[contexto.area]) {
        msg("✅ PIN Verificado correctamente.", "user");
        menuProblemas();
    } else {
        msg("❌ PIN Incorrecto. Intenta de nuevo.");
    }
}

function menuProblemas() {
    guardarPaso(() => acceder(contexto.area));
    msg("¿Cuál es el inconveniente técnico?");
    menu.innerHTML = `
        <div class="buttons">
            <div class="card" onclick="diagnostico('Internet')">📶 Internet</div>
            <div class="card" onclick="diagnostico('Impresora')">🖨️ Impresora</div>
            <div class="card" onclick="diagnostico('Cerradura')">🚪 Cerradura</div>
        </div>`;
}

/* 🔍 DIAGNÓSTICO E INTERACCIÓN */
function diagnostico(tipo) {
    contexto.problema = tipo;
    contexto.paso = 0;
    msg(`Iniciando guía de solución para ${tipo}...`);
    mostrarPaso();
}

function mostrarPaso() {
    const soluciones = SOLUCIONES[contexto.problema];
    
    if (contexto.paso < soluciones.length) {
        msg(`Paso ${contexto.paso + 1}:`, "bot");
        msg(`<div class="step-box">${soluciones[contexto.paso]}</div>`, "bot", true);
        msg("¿Se solucionó el problema con esto?");
        menu.innerHTML = `
            <div class="buttons">
                <button class="action-btn" onclick="solucionado()">SÍ, ya funciona</button>
                <button class="action-btn" onclick="siguiente()">NO, sigue fallando</button>
            </div>`;
    } else {
        msg("Lo siento, hemos agotado las pruebas básicas. Es necesario escalar con un técnico.");
        menu.innerHTML = `
            <div class="buttons">
                <button class="action-btn" style="background:var(--danger)" onclick="crearReporte()">⚠️ GENERAR REPORTE TI</button>
            </div>`;
    }
}

function siguiente() {
    contexto.paso++;
    mostrarPaso();
}

function solucionado() {
    msg("¡Excelente noticia! Se cierra el folio de consulta. Buen día.", "bot");
    setTimeout(salir, 4000);
}

/* 🚀 REPORTE FINAL Y WHATSAPP */
function crearReporte() {
    const folio = "P-" + (Math.floor(Math.random() * 9000) + 1000);
    const fecha = new Date().toLocaleString();
    
    msg("Generando Ticket de Soporte...", "bot");
    
    const ticketHTML = `
        <div class="ticket">
            <strong>TICKET DE EMERGENCIA #${folio}</strong><br>
            <hr>
            <strong>HOTEL:</strong> ${CONFIG.hoteles[contexto.hotel]}<br>
            <strong>ÁREA:</strong> ${contexto.area.toUpperCase()}<br>
            <strong>FALLA:</strong> ${contexto.problema}<br>
            <strong>ESTADO:</strong> Pendiente de revisión
        </div>`;
    
    msg(ticketHTML, "bot", true);

    // Mensaje Detallado para WhatsApp
    const mensajeWA = 
        `*SOLICITUD DE SOPORTE TÉCNICO*%0A` +
        `----------------------------------------%0A` +
        `🆔 *Folio:* ${folio}%0A` +
        `📅 *Fecha:* ${fecha}%0A` +
        `📍 *Hotel:* ${CONFIG.hoteles[contexto.hotel]}%0A` +
        `🏢 *Área:* ${contexto.area.toUpperCase()}%0A` +
        `⚠️ *Problema:* ${contexto.problema}%0A%0A` +
        `🔍 *Diagnóstico previo:* El usuario intentó los ${contexto.paso} pasos de la guía automática sin éxito.%0A` +
        `----------------------------------------%0A` +
        `_Enviado desde el Asistente Digital TI_`;

    menu.innerHTML = `
        <button class="action-btn" style="background:#25D366; width:100%; font-size:1rem;" 
                onclick="window.open('https://wa.me/${CONFIG.numeroTI}?text=${mensajeWA}')">
            📲 NOTIFICAR AL ING. OMAR POR WHATSAPP
        </button>`;
}

window.onload = elegirHotel;
</script>

</body>
</html>
